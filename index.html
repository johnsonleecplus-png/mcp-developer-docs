        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-secondary: #475569;
            --border-color: #cbd5e1;
            --success-color: #059669;
            --warning-color: #d97706;
            --danger-color: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #2563eb 0%, #93c5fd 100%);
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.15);
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        header p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.1em;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            background-color: #ffffff;
            color: #0f172a;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.15);
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .category-tab {
            padding: 10px 20px;
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: #475569;
        }

        .category-tab:hover,
        .category-tab.active {
            background-color: #dbeafe;
            border-color: #93c5fd;
            color: #1e40af;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.12);
        }

        .mcp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        .mcp-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .mcp-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .mcp-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .mcp-name {
            font-size: 1.25em;
            font-weight: 600;
            color: var(--text-color);
        }

        .mcp-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-local {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .badge-official {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .badge-community {
            background-color: rgba(245, 158, 11, 0.2);
            color: var(--warning-color);
        }

        .mcp-description {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
            line-height: 1.7;
        }

        .mcp-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #64748b;
        }

        .meta-item span {
            color: #334155;
            font-weight: 500;
        }

        .mcp-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            padding: 4px 10px;
            background-color: #e0f2fe;
            border-radius: 6px;
            font-size: 12px;
            color: #0369a1;
        }

        .mcp-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        .rating {
            display: flex;
            gap: 4px;
        }

        .star {
            color: #f59e0b;
            font-size: 16px;
        }

        .star.empty {
            color: #d1d5db;
        }

        .detail-link {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .detail-link:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .modal-content {
            background-color: #ffffff;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            position: relative;
            margin: 20px auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        .modal-close:hover {
            color: #475569;
        }

        .modal-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .modal-title {
            font-size: 2em;
            margin-bottom: 16px;
        }

        .modal-section {
            margin-bottom: 30px;
        }

        .modal-section h3 {
            font-size: 1.1em;
            color: #1e40af;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-section p {
            color: #475569;
            line-height: 1.8;
        }

        .modal-section ul {
            list-style: none;
            padding-left: 0;
        }

        .modal-section li {
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #475569;
        }

        .modal-section li:last-child {
            border-bottom: none;
        }

        .modal-section li strong {
            color: #1e293b;
            display: inline-block;
            min-width: 120px;
        }

        .community-evaluation {
            background-color: #f0f9ff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid #60a5fa;
        }

        .community-evaluation h4 {
            color: #0369a1;
            margin-bottom: 12px;
        }

        .evaluation-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        .evaluation-icon {
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #1e40af;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }

        .code-block {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 15px;
        }

        .code-block code {
            color: #c9d1d9;
            font-family: "Fira Code", "Consolas", monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .code-block .comment {
            color: #8b949e;
        }

        .code-block .keyword {
            color: #ff7b72;
        }

        .code-block .string {
            color: #a5d6ff;
        }

        .code-block .property {
            color: #7ee787;
        }

        .hidden {
            display: none;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            background-color: #ffffff;
            border-radius: 12px;
            margin-top: 20px;
        }

            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            border-top: 2px solid #e2e8f0;
            color: #64748b;
            background-color: #f8fafc;
        }

            .mcp-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 24px;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

        let currentCategory = 'all';

        function renderStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalf = rating % 1 >= 0.5;
            let starsHtml = '';
            for (let i = 0; i < 5; i++) {
                if (i < fullStars) {
                    starsHtml += '<span class="star">★</span>';
                } else if (i === fullStars && hasHalf) {
                    starsHtml += '<span class="star">★</span>';
                } else {
                    starsHtml += '<span class="star empty">★</span>';
                }
            }
            return starsHtml;
        }

        function renderMCPCards(mcps) {
            const grid = document.getElementById('mcpGrid');
            const noResults = document.getElementById('noResults');

            if (mcps.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = mcps.map(mcp => `
                <div class="mcp-card" onclick="openModal('${mcp.id}')">
                    <div class="mcp-header">
                        <div class="mcp-name">${mcp.name}</div>
                        <span class="mcp-badge badge-${mcp.badge}">${mcp.badge === 'local' ? '本地' : mcp.badge === 'official' ? '官方' : '社区'}</span>
                    </div>
                    <div class="mcp-description">${mcp.description}</div>
                    <div class="mcp-meta">
                        <div class="meta-item">🏢 <span>${mcp.owner}</span></div>
                        <div class="meta-item">⭐ <span>${mcp.stars.toLocaleString()}</span></div>
                    </div>
                    <div class="mcp-tags">
                        ${mcp.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="mcp-footer">
                        <div class="rating">${renderStars(mcp.rating)}</div>
                        <a href="#" class="detail-link" onclick="event.stopPropagation(); openModal('${mcp.id}')">查看详情 →</a>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const mcp = mcpData.find(m => m.id === id);
            if (!mcp) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-header">
                    <h2 class="modal-title">${mcp.name}</h2>
                    <span class="mcp-badge badge-${mcp.badge}" style="font-size: 14px; padding: 6px 16px;">${mcp.badge === 'local' ? '本地' : mcp.badge === 'official' ? '官方' : '社区'}</span>
                </div>

                <div class="modal-section">
                    <h3>📖 概述</h3>
                    <p>${mcp.description}</p>
                </div>

                <div class="modal-section">
                    <h3>🏢 所属机构</h3>
                    <p><strong>${mcp.owner}</strong></p>
                </div>

                <div class="modal-section">
                    <h3>📚 背景介绍</h3>
                    <p>${mcp.background}</p>
                </div>

                <div class="modal-section">
                    <h3>✨ 核心功能</h3>
                    <ul>
                        ${mcp.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                </div>

                <div class="modal-section">
                    <h3>💡 典型应用场景</h3>
                    <ul>
                        ${mcp.useCases.map(u => `<li>${u}</li>`).join('')}
                    </ul>
                </div>

                <div class="modal-section">
                    <h3>✅ 优势</h3>
                    <ul>
                        ${mcp.pros.map(p => `<li>${p}</li>`).join('')}
                    </ul>
                </div>

                <div class="modal-section">
                    <h3>⚠️ 局限性</h3>
                    <ul>
                        ${mcp.cons.map(c => `<li>${c}</li>`).join('')}
                    </ul>
                </div>

                <div class="community-evaluation">
                    <h4>💬 社区评价</h4>
                    <p>${mcp.community}</p>
                </div>

                <div class="modal-section">
                    <h3>📦 安装命令</h3>
                    <div class="code-block">
                        <code>${mcp.install}</code>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${mcp.rating}</div>
                        <div class="stat-label">评分</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${mcp.stars.toLocaleString()}</div>
                        <div class="stat-label">GitHub Stars</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${mcp.tags.length}</div>
                        <div class="stat-label">标签数量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${mcp.features.length}</div>
                        <div class="stat-label">功能数量</div>
                    </div>
                </div>
            `;

            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function filterMCPs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = mcpData.filter(mcp => {
                const matchesSearch = mcp.name.toLowerCase().includes(searchTerm) ||
                    mcp.description.toLowerCase().includes(searchTerm) ||
                    mcp.tags.some(tag => tag.toLowerCase().includes(searchTerm)) ||
                    mcp.owner.toLowerCase().includes(searchTerm);
                const matchesCategory = currentCategory === 'all' || mcp.category === currentCategory;
                return matchesSearch && matchesCategory;
            });
            renderMCPCards(filtered);
        }

        function setupCategoryTabs() {
            const tabs = document.querySelectorAll('.category-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    filterMCPs();
                });
            });
        }

        document.getElementById('searchInput').addEventListener('input', filterMCPs);

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        renderMCPCards(mcpData);
        setupCategoryTabs();
    </script>
</body>
</html>
